<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Ulang Tahun Shava 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #c084fc;
    --purple-dark: #7c3aed;
    --purple-light: #e9d5ff;
    --pink: #f472b6;
    --pink-light: #fce7f3;
    --lavender: #ddd6fe;
    --sky: #bae6fd;
    --bg: #f5e6ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #f0d6ff 0%, #fce7f3 40%, #dbeafe 100%);
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Floating sparkles background */
  .sparkle-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .sp {
    position: absolute;
    width: var(--s, 12px);
    height: var(--s, 12px);
    background: var(--purple);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    opacity: 0;
    animation: sparkleFly var(--d, 4s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }

  @keyframes sparkleFly {
    0% { opacity: 0; transform: translateY(0) rotate(0deg) scale(0); }
    20% { opacity: 0.8; transform: translateY(-30px) rotate(90deg) scale(1); }
    80% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-120px) rotate(360deg) scale(0.3); }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 2;
    background: white;
    border-radius: 32px;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(192, 132, 252, 0.35), 0 2px 8px rgba(244, 114, 182, 0.2);
    overflow: hidden;
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #ddd6fe 0%, #f5d0fe 50%, #fce7f3 100%);
    padding: 30px 24px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -20px; left: -20px;
    width: 120px; height: 120px;
    background: rgba(192,132,252,0.2);
    border-radius: 50%;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -30px; right: -20px;
    width: 150px; height: 150px;
    background: rgba(244,114,182,0.15);
    border-radius: 50%;
  }

  .rainbow {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 10px;
  }

  .rainbow span {
    font-size: 20px;
    animation: bounce var(--bd, 1s) ease-in-out infinite alternate;
    animation-delay: var(--bdelay, 0s);
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-8px); }
  }

  /* Kuromi character SVG area */
  .kuromi-area {
    display: flex;
    justify-content: center;
    position: relative;
    z-index: 1;
    margin: 5px 0;
    animation: floatKuromi 3s ease-in-out infinite;
  }

  @keyframes floatKuromi {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-10px) rotate(1deg); }
  }

  .header-title {
    font-family: 'Pacifico', cursive;
    font-size: 13px;
    color: #a855f7;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }

  /* Body */
  .body {
    padding: 24px;
  }

  .you-are-invited {
    text-align: center;
    margin-bottom: 20px;
  }

  .you-are-invited .sub {
    font-size: 12px;
    color: #a855f7;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .you-are-invited .name {
    font-family: 'Pacifico', cursive;
    font-size: 28px;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin: 6px 0;
  }

  .you-are-invited .celebrate {
    font-size: 13px;
    color: #9ca3af;
    font-weight: 600;
  }

  /* Divider bow */
  .divider {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 16px 0;
  }

  .divider-line {
    flex: 1;
    height: 1.5px;
    background: linear-gradient(to right, transparent, #e9d5ff, transparent);
  }

  .divider-icon {
    font-size: 18px;
    animation: spin 4s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Info cards */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .info-card {
    background: linear-gradient(135deg, #faf5ff, #fdf2f8);
    border: 1.5px solid #e9d5ff;
    border-radius: 16px;
    padding: 14px 12px;
    text-align: center;
    transition: transform 0.2s;
  }

  .info-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(192,132,252,0.2);
  }

  .info-card .icon {
    font-size: 22px;
    margin-bottom: 6px;
    display: block;
  }

  .info-card .label {
    font-size: 10px;
    color: #a855f7;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .info-card .value {
    font-size: 13px;
    font-weight: 900;
    color: #6d28d9;
    line-height: 1.3;
  }

  /* Theme badge */
  .theme-card {
    background: linear-gradient(135deg, #7c3aed, #c084fc, #ec4899);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .theme-emoji {
    font-size: 28px;
    animation: wiggle 1.5s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }

  .theme-text .tl { font-size: 11px; color: rgba(255,255,255,0.8); letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
  .theme-text .tv { font-family: 'Pacifico', cursive; font-size: 20px; color: white; }

  /* Stars decoration in theme card */
  .theme-stars {
    margin-left: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
    opacity: 0.7;
  }

  .theme-stars span { font-size: 14px; color: white; }

  /* RSVP / Footer */
  .footer {
    background: linear-gradient(135deg, #faf5ff, #fdf2f8);
    border-top: 1.5px dashed #e9d5ff;
    padding: 16px 24px;
    text-align: center;
  }

  .footer p {
    font-size: 12px;
    color: #9ca3af;
    font-weight: 600;
  }

  .footer .hearts {
    font-size: 18px;
    letter-spacing: 4px;
    margin-top: 6px;
    animation: heartbeat 1.2s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  /* Clouds decoration */
  .clouds {
    position: absolute;
    top: 10px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 10px;
    z-index: 0;
    pointer-events: none;
  }

  .cloud {
    font-size: 24px;
    opacity: 0.6;
    animation: cloudFloat 4s ease-in-out infinite alternate;
  }

  .cloud:nth-child(2) { animation-delay: 1s; animation-direction: alternate-reverse; }

  @keyframes cloudFloat {
    from { transform: translateX(-5px); }
    to { transform: translateX(5px); }
  }
</style>
</head>
<body>

<!-- Sparkle background -->
<div class="sparkle-bg" id="sparkles"></div>

<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="clouds">
      <span class="cloud">☁️</span>
      <span class="cloud">☁️</span>
    </div>

    <div class="rainbow">
      <span style="--bd:0.8s;--bdelay:0s">🌈</span>
      <span style="--bd:0.8s;--bdelay:0.1s">⭐</span>
      <span style="--bd:0.8s;--bdelay:0.2s">✨</span>
      <span style="--bd:0.8s;--bdelay:0.3s">⭐</span>
      <span style="--bd:0.8s;--bdelay:0.4s">🌈</span>
    </div>

    <!-- Kuromi SVG Character - Cute pastel version -->
    <div class="kuromi-area">
      <svg width="180" height="210" viewBox="0 0 180 210" xmlns="http://www.w3.org/2000/svg">
        <!-- Shadow -->
        <ellipse cx="90" cy="205" rx="45" ry="7" fill="rgba(168,85,247,0.2)"/>

        <!-- Body -->
        <ellipse cx="90" cy="170" rx="44" ry="38" fill="white"/>
        <!-- Dress / outfit -->
        <path d="M48 165 Q55 195 90 198 Q125 195 132 165 Q110 175 90 175 Q70 175 48 165Z" fill="#c084fc"/>
        <!-- Dress ruffle -->
        <path d="M52 178 Q65 188 90 190 Q115 188 128 178" stroke="#f0abfc" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Bow on dress -->
        <path d="M74 168 Q82 162 90 168 Q98 162 106 168 Q98 175 90 168 Q82 175 74 168Z" fill="#ec4899"/>
        <circle cx="90" cy="168" r="4" fill="#f9a8d4"/>

        <!-- Arms -->
        <ellipse cx="44" cy="168" rx="14" ry="10" fill="white" transform="rotate(-15 44 168)"/>
        <ellipse cx="136" cy="168" rx="14" ry="10" fill="white" transform="rotate(15 136 168)"/>

        <!-- Right arm holding wand -->
        <line x1="148" y1="160" x2="165" y2="110" stroke="white" stroke-width="5" stroke-linecap="round"/>
        <!-- Wand star -->
        <polygon points="165,95 168,104 178,104 170,110 173,119 165,113 157,119 160,110 152,104 162,104" fill="#fbbf24"/>
        <polygon points="165,99 167,105 173,105 168,108 170,114 165,110 160,114 162,108 157,105 163,105" fill="#fef3c7"/>

        <!-- Legs/Feet -->
        <ellipse cx="74" cy="203" rx="15" ry="9" fill="white"/>
        <ellipse cx="106" cy="203" rx="15" ry="9" fill="white"/>
        <!-- Shoe ribbon -->
        <circle cx="74" cy="203" r="4" fill="#ec4899"/>
        <circle cx="106" cy="203" r="4" fill="#ec4899"/>

        <!-- Head -->
        <circle cx="90" cy="105" r="58" fill="white"/>

        <!-- Black hood -->
        <path d="M34 95 Q38 25 90 22 Q142 25 146 95 Q140 72 90 70 Q40 72 34 95Z" fill="#2d1060"/>
        <!-- Hood ear points -->
        <polygon points="48,76 30,22 68,56" fill="#2d1060"/>
        <polygon points="132,76 150,22 112,56" fill="#2d1060"/>
        <!-- Hood inner pink -->
        <ellipse cx="48" cy="87" r="6" fill="#ec4899"/>
        <ellipse cx="132" cy="87" r="6" fill="#ec4899"/>

        <!-- Skull on hood - cute pastel -->
        <circle cx="90" cy="50" r="13" fill="#c084fc"/>
        <circle cx="85" cy="47" r="3" fill="#2d1060"/>
        <circle cx="95" cy="47" r="3" fill="#2d1060"/>
        <path d="M85 55 Q90 59 95 55" stroke="#2d1060" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <rect x="85" y="57" width="4" height="4" rx="1" fill="#2d1060"/>
        <rect x="91" y="57" width="4" height="4" rx="1" fill="#2d1060"/>

        <!-- Kuromi face -->
        <!-- Wink left eye (closed) -->
        <path d="M70 105 Q77 99 84 105" stroke="#2d1060" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Eye right (big cute) -->
        <ellipse cx="108" cy="105" rx="13" ry="15" fill="#2d1060"/>
        <circle cx="112" cy="101" r="5" fill="white"/>
        <circle cx="113" cy="102" r="2.5" fill="#a855f7"/>

        <!-- Rosy cheeks -->
        <ellipse cx="62" cy="120" rx="9" ry="6" fill="#fda4af" opacity="0.7"/>
        <ellipse cx="118" cy="120" rx="9" ry="6" fill="#fda4af" opacity="0.7"/>

        <!-- Small smile -->
        <path d="M80 128 Q90 138 100 128" stroke="#2d1060" stroke-width="2.5" fill="none" stroke-linecap="round"/>

        <!-- Hair bow (big cute ribbon) -->
        <path d="M56 80 Q72 68 85 80 Q72 90 56 80Z" fill="#ec4899"/>
        <path d="M85 80 Q98 68 114 80 Q98 90 85 80Z" fill="#ec4899"/>
        <circle cx="85" cy="80" r="7" fill="#f9a8d4"/>
        <circle cx="85" cy="80" r="4" fill="#ec4899"/>

        <!-- Stars around head -->
        <text x="20" y="90" font-size="16" fill="#fbbf24" opacity="0.9">✦</text>
        <text x="148" y="85" font-size="12" fill="#c084fc" opacity="0.9">★</text>
        <text x="25" y="130" font-size="10" fill="#f472b6" opacity="0.8">✦</text>
        <text x="150" y="130" font-size="14" fill="#fbbf24" opacity="0.8">✦</text>
      </svg>
    </div>

    <p class="header-title">✨ You're Invited ✨</p>
  </div>

  <!-- Body -->
  <div class="body">

    <div class="you-are-invited">
      <p class="sub">🎀 Ulang Tahun 🎀</p>
      <p class="name">Shava Nurramdhania</p>
      <p class="celebrate">Yuk rayakan bersama! 🎉</p>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-icon">✦</span>
      <div class="divider-line"></div>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <span class="icon">📅</span>
        <div class="label">Hari & Tanggal</div>
        <div class="value">Minggu<br>26 April 2026</div>
      </div>
      <div class="info-card">
        <span class="icon">⏰</span>
        <div class="label">Waktu</div>
        <div class="value">09.30 WIB<br>s/d Selesai</div>
      </div>
    </div>

   

    <div class="divider">
      <div class="divider-line"></div>
      <span style="font-size:16px">🎀</span>
      <div class="divider-line"></div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <p>Kehadiranmu adalah hadiah terindah! 🎁</p>
    <p>Datang ya, jangan sampai ketinggalan~ 🐾</p>
    <div class="hearts">💜 🖤 💜 🖤 💜</div>
  </div>

</div>

<script>
  // Generate sparkles
  const container = document.getElementById('sparkles');
  const colors = ['#c084fc','#f472b6','#fbbf24','#a855f7','#ec4899','#e879f9'];
  for (let i = 0; i < 25; i++) {
    const sp = document.createElement('div');
    sp.className = 'sp';
    sp.style.cssText = `
      left: ${Math.random()*100}vw;
      top: ${20 + Math.random()*80}vh;
      --s: ${8 + Math.random()*14}px;
      --d: ${3 + Math.random()*4}s;
      --delay: ${Math.random()*5}s;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
    `;
    container.appendChild(sp);
  }
</script>
</body>
</html>
